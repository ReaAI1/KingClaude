services:
  - type: web
    name: kingclaude
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: python -m src.main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: WEB_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
      - key: INITIAL_CAPITAL
        value: "10000"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMS_TO_NUMBER
        sync: false
