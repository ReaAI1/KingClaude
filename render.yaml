services:
  - type: web
    name: kingclaude
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install --prefer-binary --no-build-isolation -r requirements.txt
    startCommand: python -m src.main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: WEB_HOST
        value: 0.0.0.0
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
      - key: INITIAL_CAPITAL
        value: "10000"
      - key: DISCORD_WEBHOOK_URL
        sync: false
