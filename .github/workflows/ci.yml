name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System info
        run: |
          echo "=== Python ===" && python --version
          echo "=== pip ===" && pip --version
          echo "=== OS ===" && uname -a
          echo "=== CPU/RAM ===" && nproc && free -h

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install numpy first
        run: pip install --prefer-binary "numpy>=1.26"

      - name: Install scikit-learn
        run: pip install --prefer-binary "scikit-learn>=1.4"

      - name: Install lightgbm
        run: pip install --prefer-binary "lightgbm>=4.3"

      - name: Install remaining deps
        run: pip install --prefer-binary fastapi "uvicorn[standard]" jinja2 python-multipart requests urllib3 python-dotenv pytest

      - name: Show installed packages
        run: pip list

      - name: Run tests
        run: python -m pytest tests/ -v --tb=long

      - name: Smoke test imports
        run: python tests/check_imports.py
