name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install system deps
        run: sudo apt-get install -y libgomp1

      - name: Install packages
        run: pip install --prefer-binary fastapi uvicorn jinja2 python-multipart requests urllib3 numpy scikit-learn lightgbm python-dotenv pytest

      - name: Show installed packages
        run: pip list

      - name: Run tests
        run: python -m pytest tests/ -v --tb=long

      - name: Smoke test imports
        run: python tests/check_imports.py
