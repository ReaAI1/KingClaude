name: Deploy to Server

# Only runs when you manually trigger it OR when SERVER_HOST secret is set
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if SERVER_HOST secret exists
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/aurentis-trader
            git pull origin main
            venv/bin/pip install -r requirements.txt -q
            systemctl restart aurentis-trader
            echo "Deploy complete at $(date)"

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS:  ${{ job.status }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            COLOR=$([ "$STATUS" = "success" ] && echo 3066993 || echo 15158332)
            curl -sf -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"Deploy $STATUS\",\"description\":\"Aurentis AI deployed\",\"color\":$COLOR}]}" || true
          fi
